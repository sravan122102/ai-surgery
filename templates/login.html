<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurgiScore — Sign In</title>
    <meta name="description" content="Sign in to SurgiScore to save your surgical performance results and track your progress over time.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060b12; --bg2: #0b1520; --panel: #0f1d30; --border: #193352;
            --cyan: #00d4ff; --green: #00ffb3; --amber: #ffc820; --red: #ff3d5a;
            --purple: #b388ff; --white: #ddeeff; --grey: #6b8ab0;
        }
        body {
            background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(0,212,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(0,255,179,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(179,136,255,0.04) 0%, transparent 60%);
        }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px; padding: 20px;
        }

        .login-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,212,255,0.05);
        }

        .logo-icon {
            width: 64px; height: 64px; margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,255,179,0.1));
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; border: 1px solid rgba(0,212,255,0.2);
        }

        .brand {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; color: var(--cyan); letter-spacing: 5px;
            text-transform: uppercase; margin-bottom: 8px; opacity: 0.8;
        }

        h1 {
            font-size: 28px; font-weight: 800; color: var(--white);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px; color: var(--grey); line-height: 1.6;
            margin-bottom: 36px;
        }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px 24px;
            background: var(--white); color: #1a1a2e;
            border: none; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            text-decoration: none;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(221,238,255,0.2);
        }

        .google-btn svg { width: 20px; height: 20px; }

        .divider {
            display: flex; align-items: center; gap: 16px;
            margin: 28px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span { font-size: 11px; color: var(--grey); text-transform: uppercase; letter-spacing: 1px; }

        .info-text {
            font-size: 12px; color: var(--grey); line-height: 1.6;
        }
        .info-text a { color: var(--cyan); text-decoration: none; }

        .back-link {
            display: inline-block; margin-top: 24px;
            color: var(--grey); font-size: 13px; text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--cyan); }

        /* Floating particles */
        .particles {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: var(--cyan); border-radius: 50%; opacity: 0.3;
            animation: float 8s infinite ease-in-out;
        }
        .particle:nth-child(2) { left: 20%; top: 30%; animation-delay: 1s; background: var(--green); }
        .particle:nth-child(3) { left: 70%; top: 60%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 40%; top: 80%; animation-delay: 3s; background: var(--purple); }
        .particle:nth-child(5) { left: 85%; top: 20%; animation-delay: 4s; background: var(--green); }
        .particle:nth-child(6) { left: 10%; top: 70%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="left:50%;top:10%"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-icon">🔬</div>
            <div class="brand">SurgiScore</div>
            <h1>Welcome Back</h1>
            <p class="subtitle">
                Sign in to save your analysis results<br>and track your surgical performance
            </p>

            <a href="/login/google" class="google-btn" id="google-signin-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </a>

            <div class="divider"><span>Why sign in?</span></div>

            <p class="info-text">
                Save and compare your surgical performance across sessions.
                Track improvements over time with detailed analytics and AI-powered feedback.
            </p>
        </div>

        <div style="text-align:center">
            <a href="/" class="back-link">← Back to Analyzer</a>
        </div>
    </div>
</body>
</html>
