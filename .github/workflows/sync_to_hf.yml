name: Sync Code to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload sravan2102/surgiscore . --repo-type space --exclude ".git/*" ".github/*" "venv/*"
