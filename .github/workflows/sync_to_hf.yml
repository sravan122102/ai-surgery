name: Sync Code to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "from huggingface_hub import HfApi; HfApi().upload_folder(folder_path='.', repo_id='sravan2102/surgiscore', repo_type='space', ignore_patterns=['.git*', '.github*', 'venv*'])"
      - name: Force Restart Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "from huggingface_hub import HfApi; HfApi().restart_space(repo_id='sravan2102/surgiscore', factory_rebuild=True)"
